image: python:3.12-slim

default:
  tags:
    - build

stages:
  - build
  - publish
  - publish-pypi

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip
  - pip install build twine toml

build_library:
  stage: build
  script:
    - python update_version.py
    - pip install -e ".[dev]"
    - python -m unittest discover -s tests
    - python -m build
  artifacts:
    paths:
      - dist/*

  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

publish_library:
  stage: publish
  needs: ["build_library"]
  script:
    - python -m twine upload --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" -u "gitlab-ci-token" -p "${CI_JOB_TOKEN}" dist/*
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG == null

publish_on_pypi:
  stage: publish-pypi
  needs: ["build_library"]
  script:
    - python -m twine upload -u "__token__" -p "${PYPI_PASSWORD}" dist/*
  rules:
    - if: $CI_COMMIT_TAG
